<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOFI· Usuarios</title>
  <link rel="stylesheet" href="../css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="login-screen" style="display:none"></div>
  <div id="app-shell">
    <div class="sidebar-scrim" id="sidebar-scrim" onclick="toggleSidebar()"></div>
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo"><div class="sidebar-logo-text">SOFI<span>.</span></div></div>
      <div class="sidebar-role-badge" id="sb-role-badge"></div>
      <div class="sidebar-nav" id="sb-nav"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sb-avatar"></div>
          <div class="sidebar-user-info">
            <span class="sidebar-user-name" id="sb-name"></span>
            <span class="sidebar-user-role" id="sb-role"></span>
          </div>
        </div>
        <button type="button" class="sidebar-logout" onclick="doLogout()">Cerrar sesión</button>
      </div>
    </nav>

    <div class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;min-width:0">
          <button type="button" class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
          <div class="breadcrumb" id="breadcrumb"><span>SOFI</span><span class="sep">›</span><span class="current">Usuarios</span></div>
        </div>
        <div class="topbar-actions">
          <button type="button" class="topbar-btn" onclick="showModal('alertas-modal')">🔔 Alertas <span class="badge-notif" id="notif-count">0</span></button>
          <button type="button" class="topbar-btn" onclick="window.location.href='configuracion.html'">⚙️ Configuración</button>
        </div>
      </div>

      <main class="page-content" id="page-content">
        <div class="section-header">
          <div class="section-title">Usuarios del Sistema</div>
          <button class="btn-outline" style="margin-right:12px;" onclick="if(window.exportCurrentTable) window.exportCurrentTable()">Exportar CSV</button><button class="btn-accent" onclick="abrirModalCrearUsuario()">Nuevo Usuario</button>
        </div>

        <div class="table-wrap">
          <div class="table-toolbar">
            <input class="search-input" placeholder="Buscar usuarioâ€¦" style="max-width:240px">
            <select class="filter-select"><option>Todos los roles</option><option>Directivo</option><option>Vendedor</option><option>Asistente</option></select>
            <select class="filter-select"><option>Todos los estatus</option><option>Activo</option><option>Inactivo</option></select>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Rol</th>
                <th>Empleado ID</th>
                <th>Estatus</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-usuarios-body"></tbody>
          </table>
          <div class="table-pagination">
            <span id="usuarios-paginacion">Cargando...</span>
            <div style="display:flex;gap:4px" id="usuarios-paginas"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- MODAL CREAR USUARIO -->
  <div id="crear-usuario-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:600px;max-height:90vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="modal-title">Nuevo Usuario</div>
        <button onclick="cerrarModal('crear-usuario-modal')" style="font-size:20px;background:none;border:none;cursor:pointer;">âœ•</button>
      </div>
      <form id="form-crear-usuario" onsubmit="event.preventDefault(); guardarUsuarioModal();">
        <div class="form-grid">
          <div class="form-group full"><label>Empleado Asignado *</label>
            <select id="usu-empleado-id" required>
              <option value="">Cargando empleados…</option>
            </select>
          </div>
          <div class="form-group"><label>Nombre de Usuario (Correo) *</label><input id="usu-email" type="email" placeholder="correo@sofi.mx" required></div>
          <div class="form-group"><label>Contraseña *</label><input id="usu-password" type="password" placeholder="Mín. 8 caracteres" required></div>
          <div class="form-group"><label>Rol *</label>
            <select id="usu-rol" required>
              <option value="">Seleccionar…</option>
              <option value="Directivo">Directivo</option>
              <option value="Vendedor">Vendedor</option>
              <option value="Asistente">Asistente</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-outline" onclick="cerrarModal('crear-usuario-modal')">Cancelar</button>
          <button type="submit" class="btn-accent">Crear Usuario</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL EDITAR USUARIO -->
  <div id="editar-usuario-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:600px;max-height:90vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="modal-title">Editar Usuario</div>
        <button onclick="cerrarModal('editar-usuario-modal')" style="font-size:20px;background:none;border:none;cursor:pointer;">âœ•</button>
      </div>
      <form id="form-editar-usuario" onsubmit="event.preventDefault(); actualizarUsuarioModal();">
        <input type="hidden" id="edit-usuario-id">
        <div class="form-grid">
          <div class="form-group full"><label>Empleado Asignado</label>
            <input id="edit-usu-empleado" type="text" disabled style="background:#f5f5f5">
          </div>
          <div class="form-group"><label>Nombre de Usuario (Correo) *</label><input id="edit-usu-email" type="email" placeholder="correo@sofi.mx" required></div>
          <div class="form-group"><label>Rol *</label>
            <select id="edit-usu-rol" required>
              <option value="">Seleccionar…</option>
              <option value="Directivo">Directivo</option>
              <option value="Vendedor">Vendedor</option>
              <option value="Asistente">Asistente</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-outline" onclick="cerrarModal('editar-usuario-modal')">Cancelar</button>
          <button type="submit" class="btn-accent">Actualizar Usuario</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-root"></div>
  <script src="../js/core/config.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/core/app.js"></script>
  <script src="../js/modules/usuarios.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
