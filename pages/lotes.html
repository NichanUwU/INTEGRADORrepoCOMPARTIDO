<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOFI Â· Lotes</title>
  <link rel="stylesheet" href="../css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="login-screen" style="display:none"></div>
  <div id="app-shell">
    <div class="sidebar-scrim" id="sidebar-scrim" onclick="toggleSidebar()"></div>
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo"><div class="sidebar-logo-text">SOFI<span>.</span></div></div>
      <div class="sidebar-role-badge" id="sb-role-badge"></div>
      <div class="sidebar-nav" id="sb-nav"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sb-avatar"></div>
          <div class="sidebar-user-info">
            <span class="sidebar-user-name" id="sb-name"></span>
            <span class="sidebar-user-role" id="sb-role"></span>
          </div>
        </div>
        <button type="button" class="sidebar-logout" onclick="doLogout()">Cerrar sesión</button>
      </div>
    </nav>

    <div class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;min-width:0">
          <button type="button" class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
          <div class="breadcrumb" id="breadcrumb"><span>SOFI</span><span class="sep">›</span><span class="current">Lotes</span></div>
        </div>
        <div class="topbar-actions">
          <button type="button" class="topbar-btn" onclick="showModal('alertas-modal')">🔔 Alertas <span class="badge-notif" id="notif-count">0</span></button>
          <button type="button" class="topbar-btn" onclick="window.location.href='configuracion.html'">⚙️ Configuración</button>
        </div>
      </div>

      <main class="page-content" id="page-content">
        <div class="section-header">
          <div class="section-title">Gestión de Lotes</div>
          <button class="btn-outline" style="margin-right:12px;" onclick="if(window.exportCurrentTable) window.exportCurrentTable()"> Exportar CSV</button><button id="btn-nuevo-lote" class="btn-accent" onclick="abrirModal('crear-lote-modal')">Nuevo Lote</button>
        </div>

        <div class="table-wrap">
          <div class="table-toolbar">
            <input id="search-lote" class="search-input" placeholder="Buscar lote" style="max-width:240px" oninput="filtrarLotes()">
            <select id="filter-desarrollo" class="filter-select" onchange="filtrarLotes()"><option value="">Todos los Desarrollos</option></select>
            <select id="filter-estatus" class="filter-select" onchange="filtrarLotes()">
              <option value="">Todos los Estatus</option>
              <option value="Disponible">Disponible</option>
              <option value="Vendido">Vendido</option>
              <option value="Reservado">Reservado</option>
            </select>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Desarrollo</th>
                <th>Núm. Lote</th>
                <th>Superficie</th>
                <th>Precio</th>
                <th>Norte</th>
                <th>Sur</th>
                <th>Este</th>
                <th>Oeste</th>
                <th>Estatus</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-lotes-body"></tbody>
          </table>
          <div class="table-pagination">
            <span id="lotes-paginacion">Cargando...</span>
            <div style="display:flex;gap:4px" id="lotes-paginas"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- MODAL CREAR LOTE -->
  <div id="crear-lote-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:720px;max-height:90vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="modal-title">Nuevo Lote</div>
        <button onclick="cerrarModal('crear-lote-modal')" style="font-size:20px;background:none;border:none;cursor:pointer;">X</button>
      </div>
      <form id="form-crear-lote" onsubmit="event.preventDefault(); guardarLoteModal();">
        <div class="form-grid">
          <div class="form-group"><label>Desarrollo *</label>
            <select id="lote-desarrollo" required onchange="cargarManzanasDesarrollo(this.value, 'lote-manzana')">
              <option value="">Seleccionar…</option>
            </select>
          </div>
          <div class="form-group"><label>Manzana *</label>
            <select id="lote-manzana" required>
              <option value="">Seleccione un desarrollo primero</option>
            </select>
          </div>
          <div class="form-group"><label>Número de Lote *</label><input id="lote-numero" type="text" placeholder="Ej. A-12" required></div>
          <div class="form-group"><label>Superficie (mÂ²) *</label><input id="lote-medidas" type="number" placeholder="120" min="1" required></div>
          <div class="form-group"><label>Precio de Lista *</label><input id="lote-precio" type="number" placeholder="350000" min="0" required></div>
          <div class="form-group"><label>Estatus *</label>
            <select id="lote-estado" required>
              <option value="Disponible">Disponible</option>
              <option value="Vendido">Vendido</option>
              <option value="Reservado">Reservado</option>
            </select>
          </div>
          <div class="form-group full"><label>Colindancias</label></div>
          <div class="form-group"><label>Norte</label><input id="lote-norte" placeholder="Descripción del colindante"></div>
          <div class="form-group"><label>Sur</label><input id="lote-sur" placeholder="Descripción del colindante"></div>
          <div class="form-group"><label>Este</label><input id="lote-este" placeholder="Descripción del colindante"></div>
          <div class="form-group"><label>Oeste</label><input id="lote-oeste" placeholder="Descripción del colindante"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-outline" onclick="cerrarModal('crear-lote-modal')">Cancelar</button>
          <button type="submit" class="btn-accent">Guardar Lote</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL EDITAR LOTE -->
  <div id="editar-lote-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:720px;max-height:90vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="modal-title">Editar Lote</div>
        <button onclick="cerrarModal('editar-lote-modal')" style="font-size:20px;background:none;border:none;cursor:pointer;">X</button>
      </div>
      <form id="form-editar-lote" onsubmit="event.preventDefault(); actualizarLoteModal();">
        <input type="hidden" id="edit-lote-id">
        <div class="form-grid">
          <div class="form-group"><label>Desarrollo *</label>
            <select id="edit-lote-desarrollo" required onchange="cargarManzanasDesarrollo(this.value, 'edit-lote-manzana')">
              <option value="">Seleccionar…</option>
            </select>
          </div>
          <div class="form-group"><label>Manzana *</label>
            <select id="edit-lote-manzana" required>
              <option value="">Seleccione un desarrollo primero</option>
            </select>
          </div>
          <div class="form-group"><label>Número de Lote *</label><input id="edit-lote-numero" type="text" placeholder="Ej. A-12" required></div>
          <div class="form-group"><label>Superficie (mÂ²) *</label><input id="edit-lote-medidas" type="number" placeholder="120" min="1" required></div>
          <div class="form-group"><label>Precio de Lista *</label><input id="edit-lote-precio" type="number" placeholder="350000" min="0" required></div>
          <div class="form-group"><label>Estatus *</label>
            <select id="edit-lote-estado" required>
              <option value="Disponible">Disponible</option>
              <option value="Vendido">Vendido</option>
              <option value="Reservado">Reservado</option>
            </select>
          </div>
          <div class="form-group full"><label>Colindancias</label></div>
          <div class="form-group"><label>Norte</label><input id="edit-lote-norte" placeholder="Descripción del colindante"></div>
          <div class="form-group"><label>Sur</label><input id="edit-lote-sur" placeholder="Descripción del colindante"></div>
          <div class="form-group"><label>Este</label><input id="edit-lote-este" placeholder="Descripción del colindante"></div>
          <div class="form-group"><label>Oeste</label><input id="edit-lote-oeste" placeholder="Descripción del colindante"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-outline" onclick="cerrarModal('editar-lote-modal')">Cancelar</button>
          <button type="submit" class="btn-accent">Actualizar Lote</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-root"></div>
  <script src="../js/core/config.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/core/app.js"></script>
  <script src="../js/modules/lotes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
